  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nd:none; color:#ff00aa; font-family:'Anton',sans-serif; font-size:30px; cursor:pointer; line-height:1;\">×<\u002Fbutton>\n        <div style=\"font-size:54px; animation:float 2.5s ease-in-out infinite;\">🤡<\u002Fdiv>\n        <h3 style=\"font-family:'Bungee',sans-serif; font-size:30px; color:#c8ff00; margin:14px 0 0; line-height:1;\">ТЕБЕ ЗАПИСАНО!<\u002Fh3>\n        <p style=\"font-weight:700; font-size:15px; line-height:1.7; color:#fff; margin:18px 0 0;\">{{ joke }}<\u002Fp>\n        <div style=\"margin-top:24px; border-top:2px dashed #00e1ff; padding-top:18px; font-weight:700; font-size:13px; color:#00e1ff; line-height:1.7;\">\n          Підтвердження — у директ <span style=\"color:#c8ff00;\">@нік_організатора<\u002Fspan><br>не забудь рибу 🐟\n        <\u002Fdiv>\n        <button onclick=\"{{ closePopup }}\" class=\"acid-btn\" style=\"margin-top:24px; border:none; cursor:pointer; background:#ff00aa; color:#fff; font-family:'Anton',sans-serif; font-size:24px; padding:12px 30px; box-shadow:5px 5px 0 #00e1ff; transition:transform .15s;\">ЗРОЗУМІВ, ЙДУ ПО РИБУ<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { popupOpen: false, jokeIdx: 0 };\n\n  jokes = [\n    \"Місце в списку твоє. Місце за столом — лише якщо принесеш рибу більшу за сусіда.\",\n    \"Вітаємо! Ти офіційно погодився не питати, навіщо на вечірці клоуни. Назад дороги немає.\",\n    \"Бронь підтверджено. Маргарита вже наливається, риба вже в'ялиться, клоуни вже репетирують.\",\n    \"Готово. Єдине прохання: не годуй клоунів рибою — вони після цього співають.\",\n    \"Запис прийнято. Якщо завтра насниться клоун із сушеною рибою — це нормально, це передчуття.\"\n  ];\n\n  openPopup = () => {\n    this.setState(s => ({ popupOpen: true, jokeIdx: Math.floor(Math.random() * this.jokes.length) }));\n  };\n  closePopup = () => this.setState({ popupOpen: false });\n  stop = (e) => e.stopPropagation();\n  replay = (e) => { const v = e.target; v.currentTime = 0; v.play().catch(()=>{}); };\n\n  componentDidMount() {\n    const v = document.getElementById('hero-video');\n    if (v && !v.src) { v.src = 'https://res.cloudinary.com/ddslmubvu/video/upload/v1782311190/2_1080_N_qfnqtq.mp4'; v.play().catch(()=>{}); }\n  }\n\n  renderVals() {\n    return {\n      popupOpen: this.state.popupOpen,\n      openPopup: this.openPopup,\n      closePopup: this.closePopup,\n      stop: this.stop,\n      replay: this.replay,\n      joke: this.jokes[this.state.jokeIdx],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"

      '#party-archive .archive-slide.is-active{filter:saturate(1.14) brightness(1.03);box-shadow:0 32px 94px rgba(0,0,0,.66),0 0 42px rgba(0,216,255,.24),inset 0 0 0 1px rgba(255,255,255,.18)}',
      '#party-archive .archive-slide[data-offset="0"]{--x:0px;--z:190px;--rot:0deg;--scale:1.35;--opacity:1;--zindex:10}',
      '#party-archive .archive-slide[data-offset="1"]{--x:clamp(170px,25vw,360px);--z:40px;--rot:-12deg;--scale:.82;--opacity:.86;--zindex:9}',

      '#party-archive .archive-slide[data-offset="2"]{--x:clamp(310px,43vw,620px);--z:-95px;--rot:-21deg;--scale:.66;--opacity:.64;--zindex:8}',
      '#party-archive .archive-slide[data-offset="-2"]{--x:clamp(-620px,-43vw,-310px);--z:-95px;--rot:21deg;--scale:.66;--opacity:.64;--zindex:8}',
      '#party-archive .archive-slide[data-offset="3"]{--x:clamp(430px,58vw,820px);--z:-210px;--rot:-31deg;--scale:.54;--opacity:.42;--zindex:7}',
      '#party-archive .archive-slide[data-offset="-3"]{--x:clamp(-820px,-58vw,-430px);--z:-210px;--rot:31deg;--scale:.54;--opacity:.42;--zindex:7}',
      '#party-archive .archive-slide[data-offset="4"],#party-archive .archive-slide[data-offset="5"]{--x:clamp(560px,72vw,980px);--z:-300px;--rot:-39deg;--scale:.46;--opacity:.2;--zindex:4}',
      '#party-archive .archive-slide[data-offset="-4"],#party-archive .archive-slide[data-offset="-5"]{--x:clamp(-980px,-72vw,-560px);--z:-300px;--rot:39deg;--scale:.46;--opacity:.2;--zindex:4}',
      '#party-archive .archive-photo{position:absolute;inset:0;background:#090909}',
      '#party-archive .archive-photo img{display:block;width:100%;height:100%;object-fit:cover}',
      '#party-archive .archive-photo:after{content:"";position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,255,255,.16),transparent 28%),radial-gradient(circle at 18% 20%,rgba(255,255,255,.12),transparent 17%);pointer-events:none}',
      '#party-archive .archive-photo:before{content:"";position:absolute;inset:10px;border:1px solid rgba(255,255,255,.22);border-radius:12px}',

      '#party-archive .archive-label strong{color:#fff;font-size:clamp(34px,4.2vw,54px);line-height:.84;letter-spacing:0}',
      '#party-archive .archive-label span{color:#00d8ff;font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}',
      '#party-archive .archive-controls{position:relative;z-index:50;display:flex;align-items:center;justify-content:center;gap:18px;margin-top:clamp(18px,3vw,30px);pointer-events:auto}',
      '#party-archive .archive-btn{position:relative;z-index:52;width:52px;height:52px;border:1px solid rgba(255,255,255,.28);border-radius:999px;background:rgba(255,255,255,.08);color:#fff;cursor:pointer;font-size:34px;line-height:1;display:grid;place-items:center;transition:transform .2s ease,background .2s ease,border-color .2s ease}',

      '#party-archive .archive-dot[aria-current="true"]{width:30px;background:#00d8ff}',

    ].join('\n');
    document.head.appendChild(style);
  }

  function ensureHeroVideo() {
    var video = document.getElementById('hero-video');
    if (!video) return;
    video.muted = true;
    video.loop = true;
    video.autoplay = true;
    video.playsInline = true;
    video.setAttribute('muted', '');
    video.setAttribute('loop', '');
    video.setAttribute('autoplay', '');
    video.setAttribute('playsinline', '');
    if (!video.getAttribute('src')) video.setAttribute('src', VIDEO_SRC);
    if (!video.querySelector('source')) {
      var source = document.createElement('source');
      source.src = VIDEO_SRC;
      source.type = 'video/mp4';
      video.appendChild(source);
    }
    var play = function () { video.play().catch(function () {}); };
    if (video.readyState >= 2) play();
    else video.addEventListener('canplay', play, { once: true });
  }

  function buildGallery() {
    var photos = [
      'assets/gallery-01.png',
      'assets/gallery-02.png',
      'assets/gallery-03.png',
      'assets/gallery-04.png',
      'assets/gallery-05.png',
      'assets/gallery-06.png',
      'assets/gallery-07.png',
      'assets/gallery-08.png',
      'assets/gallery-09.png',
      'assets/gallery-10.png'
    ];
    var slides = photos.map(function (src, index) {
      var n = String(index + 1).padStart(2, '0');
      return '<article class="archive-slide" data-party-slide aria-label="' + TEXT.photo + ' ' + n + '"><div class="archive-photo"><img src="' + src + '" alt="' + TEXT.photo + ' ' + n + '" loading="lazy" decoding="async"></div></article>';
    }).join('');
    var dots = photos.map(function (_, index) {
      return '<button class="archive-dot" type="button" data-party-dot="' + index + '" aria-label="' + TEXT.photo + ' ' + (index + 1) + '"></button>';
    }).join('');
    var section = document.createElement('section');
    section.id = 'party-archive';
    section.setAttribute('data-codex-gallery', 'true');
    section.innerHTML = '<div class="archive-wrap"><div class="archive-head"><div><p class="archive-kicker">' + TEXT.kicker + '</p><h2>' + TEXT.title + '</h2><p class="archive-lead">' + TEXT.lead + '</p></div><div class="archive-counter"><span data-gallery-current>01</span><span>/10</span></div></div><div class="archive-stage" aria-label="' + TEXT.title + '">' + slides + '</div><div class="archive-controls"><button class="archive-btn" type="button" data-gallery-prev aria-label="' + TEXT.prev + '">\u2039</button><div class="archive-dots">' + dots + '</div><button class="archive-btn" type="button" data-gallery-next aria-label="' + TEXT.next + '">\u203a</button></div></div>';
    return section;
  }

  function initGallery(section) {
    if (!section || section.dataset.ready === 'true') return;
    section.dataset.ready = 'true';
    var slides = Array.prototype.slice.call(section.querySelectorAll('[data-party-slide]'));
    var dots = Array.prototype.slice.call(section.querySelectorAll('[data-party-dot]'));
    var current = section.querySelector('[data-gallery-current]');
    var prev = section.querySelector('[data-gallery-prev]');
    var next = section.querySelector('[data-gallery-next]');
    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var active = 0;
    var timer = null;
    function offsetFor(index) {
      var offset = index - active;
      var half = slides.length / 2;
      if (offset > half) offset -= slides.length;
      if (offset < -half) offset += slides.length;
      if (offset > 5) return 5;
      if (offset < -5) return -5;
      return offset;
    }
    function render(restart) {
      slides.forEach(function (slide, index) {
        var offset = offsetFor(index);
        slide.dataset.offset = String(offset);
        slide.classList.toggle('is-active', index === active);
        slide.setAttribute('aria-hidden', index === active ? 'false' : 'true');
      });
      dots.forEach(function (dot, index) {
        dot.setAttribute('aria-current', index === active ? 'true' : 'false');
      });
      if (current) current.textContent = String(active + 1).padStart(2, '0');
      if (restart !== false) restartTimer();
    }
    function show(index, restart) {
      active = (index + slides.length) % slides.length;
      render(restart);
    }
    function restartTimer() {
      if (timer) window.clearInterval(timer);
      if (reduceMotion) return;
      timer = window.setInterval(function () { show(active + 1, false); }, 3600);
    }
    if (prev) prev.addEventListener('click', function (event) { event.preventDefault(); event.stopPropagation(); show(active - 1, true); });
    if (next) next.addEventListener('click', function (event) { event.preventDefault(); event.stopPropagation(); show(active + 1, true); });
    dots.forEach(function (dot, index) { dot.addEventListener('click', function (event) { event.preventDefault(); event.stopPropagation(); show(index, true); }); });
    slides.forEach(function (slide, index) { slide.addEventListener('click', function () { show(index, true); }); });
    section.addEventListener('click', function (event) {
      var prevTarget = event.target.closest('[data-gallery-prev]');
      var nextTarget = event.target.closest('[data-gallery-next]');
      var dotTarget = event.target.closest('[data-party-dot]');
      if (prevTarget) { event.preventDefault(); show(active - 1, true); return; }
      if (nextTarget) { event.preventDefault(); show(active + 1, true); return; }
      if (dotTarget) { event.preventDefault(); show(Number(dotTarget.getAttribute('data-party-dot')), true); }
    });
    section.addEventListener('mouseenter', function () { if (timer) window.clearInterval(timer); });
    section.addEventListener('mouseleave', restartTimer);
    render(true);
  }

  function install() {
    ensureHeroVideo();
    if (document.getElementById('party-archive')) return true;
    var rsvp = document.getElementById('rsvp');
    var rules = document.querySelector('[data-screen-label="\u041f\u0440\u0430\u0432\u0438\u043b\u0430"]');
    if (!rules || !rsvp || !rsvp.parentNode) return false;
    injectStyle();
    var gallery = buildGallery();
    rsvp.parentNode.insertBefore(gallery, rsvp);
    initGallery(gallery);
    return true;
  }

  var boot = window.setInterval(function () {
    if (install()) window.clearInterval(boot);
  }, 80);
  window.addEventListener('load', function () { window.setTimeout(install, 0); });
  document.addEventListener('visibilitychange', ensureHeroVideo);
})();
